          - conditions:
              - condition: template
                value_template: "{{ filePath is not none }}"
              - condition: template
                value_template: "{{ title is none }}"
            sequence:
              - action: "{{ device }}"
                data:
                  message: "{{ message }}"
                  data:
                    image: "{{ filePath }}"
                    duration: "{{ duration|default(10, true) }}"
          - conditions:
