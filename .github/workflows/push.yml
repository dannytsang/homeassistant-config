name: Push - Validation

permissions:
  contents: read

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
    paths:
      - '**.yaml'
      - '**.yml'
      - 'custom_components/**'
      - 'esphome/**'
      - '.github/**'
      - '!*.md'
  schedule:
    # Weekly heads-up against future channels (times are UTC on GitHub)
    - cron: "0 8 * * 6"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      run_ha_stable:
        description: Run Home Assistant stable configuration validation
        required: true
        default: true
        type: boolean
      run_esphome:
        description: Run ESPHome configuration validation
        required: true
        default: false
        type: boolean
      deploy:
        description: Deploy after successful validation
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dispatch-summary:
    name: Manual run summary
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Summarise selected inputs
        run: |
          {
            echo "## 🚀 Manual Run Summary"
            echo ""
            echo "- **Run HA stable validation:** ${{ inputs.run_ha_stable }}"
            echo "- **Run ESPHome validation:** ${{ inputs.run_esphome }}"
            echo "- **Deploy after validation:** ${{ inputs.deploy }}"
            echo ""
            echo "> This run was started manually from workflow_dispatch inputs."
          } >> "$GITHUB_STEP_SUMMARY"

  changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      esphome: ${{ steps.filter.outputs.esphome }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            esphome:
              - 'esphome/**'

  validate:
    name: Validate config
    needs: changes
    uses: ./.github/workflows/_ha-validate.yml
    permissions:
      contents: read
    with:
      # Pushes always run HA stable; manual runs use explicit input selection
      run_ha_stable: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ha_stable || github.event_name != 'workflow_dispatch' }}
      # Run ESPHome on esphome/** push changes, on the weekly schedule, or when manually requested
      run_esphome: ${{ github.event_name == 'workflow_dispatch' && inputs.run_esphome || github.event_name == 'schedule' || needs.changes.outputs.esphome == 'true' }}

  deploy:
    name: Deploy changes
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read
    steps:
      - name: Connect Tailscale
        id: ts
        uses: tailscale/github-action@v4
        if: ${{ needs.validate.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)) }}
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:homeassistant-ci

      - name: Deploy (POST webhook with retries)
        timeout-minutes: 5
        uses: Wandalen/wretry.action@v3.8.0
        if: ${{ steps.ts.outcome == 'success' }}
        with:
          action: fjogeleit/http-request-action@v1
          with: |
            url: '${{ secrets.DEPLOYMENT_URL }}'
            method: 'POST'
            timeout: 30000
            customHeaders: '{"Content-Type":"application/json"}'
            data: '{ "key_token":"${{ secrets.PULL_KEY }}" }'
            preventFailureOnNoResponse: false
          attempt_limit: 5
          attempt_delay: 3000
      - name: Post run summary
        env:
          MANUAL_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy || false }}
        run: |
          {
            echo "### Deploy Summary"
            echo ""
            echo "* Event: `${EVENT_NAME}`"
            echo "* Ref: `${GIT_REF}`"
            echo "* SHA: `${GIT_SHA}`"
            echo "* Timestamp: \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\`"
            echo ""
            if [[ "${{ steps.ts.outcome }}" == "success" ]]; then
              echo "✅ Deploy webhook was triggered successfully."
            elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${MANUAL_DEPLOY}" != "true" ]]; then
              echo "ℹ️ Deploy was skipped because manual dispatch did not request deployment."
            elif [[ "${{ github.event_name }}" == "schedule" ]]; then
              echo "ℹ️ Deploy was skipped because scheduled runs are validation-only."
            else
              echo "ℹ️ Deploy did not run. Check validation and gating conditions above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
