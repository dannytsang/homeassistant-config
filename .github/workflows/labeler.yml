name: PR Labeler

# yamllint disable-line rule:truthy
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        id: labeler
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
      - name: Summarise labeling
        if: always()
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          {
            echo "## 🏷️ PR Labeler Summary"
            echo ""
            echo "✅ Auto-labeling completed for PR #${{ github.event.pull_request.number }}"
            echo ""
            echo "- **PR Title:** ${PR_TITLE}"
            echo "- **Branch:** \`${PR_BRANCH}\`"
            echo "- **Labels applied:** Check the PR labels above"
            echo ""
            echo "Labels are automatically applied based on file changes:"
            echo "- \`ci\` — Changes to \`.github/**\`"
            echo "- \`docs\` — Changes to \`*.md\` files"
            echo "- \`custom-components\` — Changes to \`custom_components/**\`"
            echo "- \`esphome\` — Changes to \`esphome/**\`"
            echo "- \`frontend\` — Changes to automations, scripts, or scenes"
          } >> "$GITHUB_STEP_SUMMARY"
